# Jupiter Gate Config — Ingest → Requirements
# Used when profile is requirements-first. The source artifact is a raw business
# requirements document (BRD, user story set, or equivalent) — not a Jupiter INTENT.md.
#
# The loop agent's job in this profile:
#   1. Read the raw source document
#   2. Derive INTENT.md (flag as 'derived' or 'inferred')
#   3. Normalise requirements to Jupiter format
#   4. Run all gate checks — the gates surface what is missing or incorrect
#
# This file is a superset of intent-requirements.yml. It adds ingest-specific checks
# (IG series) before the standard IR checks. The IR checks are preserved in full
# because the quality bar for a normalised requirements artifact is identical regardless
# of where the input came from.
#
# Check ordering: auto checks first (deterministic), then AI checks (judgment), then human gate.
# Gate run happens inside /jupiter:iterate — there is no separate gate command.
# Gap = count of required checks failing. Phase complete = gap 0 + human gate approved.

version: "3.0"
transition: "ingest → requirements"
profile: requirements-first
description: >
  Read a raw business requirements document, derive the intent statement, and produce
  structured, complete, traceable, and tech-agnostic requirements. The gate checks surface
  gaps in both the source document (missing NFRs, ambiguous scope, compliance gaps) and the
  normalised requirements artifact.

# REQ key format reference (authoritative definition in workflow/stages.yml)
req_key_format: "REQ-{TYPE}-{DOMAIN}-{SEQ}"

# ─── Auto Checks — Ingest ─────────────────────────────────────────────────────
# Checks specific to the requirements-first ingest step.
# Verified before the standard IR auto checks run.

auto_checks:

  - id: AC-IG-001
    name: source_document_readable
    description: >
      The source document path recorded in initiative.source_document exists and
      is readable. The loop agent must be able to load the full document content
      before any extraction or normalisation can proceed.
    required: true
    failure_message: >
      Source document not found or unreadable at the path recorded in
      initiative.source_document. Verify the path is correct and the file is
      accessible, then re-run /jupiter:iterate.

  - id: AC-IG-002
    name: intent_artifact_produced
    description: >
      INTENT.md has been written by the loop agent and contains no placeholder
      text ([TODO], [REPLACE], TBD, or similar) in the Problem Statement,
      Business Context, Desired Outcomes, or Known Constraints sections.
      The placeholder content written by /jupiter:init must have been replaced.
    required: true
    failure_message: >
      INTENT.md still contains placeholder text. The loop agent must derive
      and write the intent statement before requirements can be extracted.
      Re-run /jupiter:iterate to complete the ingest step.

  - id: AC-IG-003
    name: intent_derivation_declared
    description: >
      The initiative file records intent_derivation under phases.requirements
      with one of two values: 'derived' (extracted directly from explicit
      content in the source document) or 'inferred' (reasoned from implicit
      content or context). This field is written by the loop agent during
      the ingest step and gates the intent confirmation check (HG-IG-001).
    required: true
    failure_message: >
      phases.requirements.intent_derivation is not set in the initiative file.
      The loop agent must record whether the intent was derived or inferred
      before the requirements gate can proceed.

# ─── Auto Checks — Standard IR ───────────────────────────────────────────────
# Identical to intent-requirements.yml. The quality bar is the same regardless
# of whether input came from a Jupiter INTENT.md or a raw business document.

  - id: AC-IR-001
    name: problem_statement_complete
    description: >
      Problem statement section is non-empty and contains no placeholder text
      (e.g. [TODO], [REPLACE], TBD, or similar).
    required: true
    failure_message: >
      Problem statement is missing, empty, or still contains placeholder text.
      A clear problem statement is required before requirements can be extracted.

  - id: AC-IR-002
    name: stakeholder_map_present
    description: >
      At least one business owner and at least one technical owner are explicitly
      named in the stakeholder map.
    required: true
    failure_message: >
      Stakeholder map must name at least one business owner and one technical owner.
      Anonymous requirements have no accountability chain.

  - id: AC-IR-003
    name: scope_boundary_documented
    description: >
      Both in-scope and out-of-scope are explicitly stated. Neither section is
      empty or omitted.
    required: true
    failure_message: >
      Scope boundary is incomplete. Both in-scope and out-of-scope sections must
      be explicitly populated. Undeclared scope becomes implicit scope — a design risk.

  - id: AC-IR-004
    name: req_keys_assigned
    description: >
      Every requirement in the artifact has a unique REQ-{TYPE}-{DOMAIN}-{SEQ} key.
      No two requirements share a key. No requirement is missing a key.
    required: true
    failure_message: >
      One or more requirements are missing a REQ key, or duplicate keys exist.
      All requirements must have unique immutable keys before gate review.

  - id: AC-IR-005
    name: req_types_valid
    description: >
      Every requirement type field is one of the five valid values: F (Functional),
      NFR (Non-Functional), BR (Business Rule), C (Compliance), S (Security).
      No other values are accepted.
    required: true
    failure_message: >
      One or more requirements have an invalid type field.
      Valid types: F, NFR, BR, C, S. Correct all type values before proceeding.

# ─── AI Checks — Ingest ──────────────────────────────────────────────────────
# Judgment checks specific to the requirements-first ingest step.
# Run before the standard IR AI checks.

ai_checks:

  - id: AI-IG-001
    name: intent_extraction_faithful
    description: >
      INTENT.md faithfully represents what is in the source document.
      If derivation is 'derived': the four intent sections (Problem Statement,
      Business Context, Desired Outcomes, Known Constraints) map directly to
      explicit content in the source document, with no material additions.
      If derivation is 'inferred': each inferred section is accompanied by
      a confidence note in phases.requirements.intent_confidence_note that
      names the specific evidence in the source document used as the basis,
      and identifies what alternative interpretations exist. Inference without
      documented evidence is not acceptable.
    required: true
    failure_message: >
      Intent extraction is not faithful to the source document. Either the derived
      content adds material that is not in the source, or the inferred content has
      no documented evidence trail. Revise INTENT.md and the confidence note to
      accurately reflect the source document content.

  - id: AI-IG-002
    name: source_coverage_complete
    description: >
      All meaningful content in the source document is accounted for. Every
      requirement, constraint, rule, or quality attribute implied by the source
      document is either: (a) captured as a REQ in the requirements artifact,
      (b) explicitly listed as out-of-scope with a reason, or (c) flagged in
      the Source Analysis section as a gap requiring architect disposition.
      Silent omission of source document content is the failure mode this prevents.
    required: true
    failure_message: >
      Source document coverage is incomplete. One or more requirements, constraints,
      or quality attributes implied by the source document are not represented in
      the requirements artifact, not listed as out-of-scope, and not flagged as a
      gap. Every meaningful piece of the source document must be explicitly accounted
      for — account for it or explain why it was dropped.

# ─── AI Checks — Standard IR ─────────────────────────────────────────────────
# Identical to intent-requirements.yml. Source analysis checks (SA series) apply
# to the derived INTENT.md — the loop agent produced it, so it is responsible for
# documenting ambiguities, gaps, and speculative content within it.

  - id: AI-IR-SA-001
    name: intent_ambiguities_documented
    description: >
      The artifact contains an "Ambiguities" subsection under "Source Analysis".
      Each ambiguity in the derived intent (terms with multiple interpretations,
      undefined concepts, vague scope language) is listed with the interpretation
      the agent chose and why. If genuinely none were found, the subsection states
      "None identified" explicitly. Silent agent interpretation of vague source
      content is the failure mode this prevents.
    required: true
    failure_message: >
      Source Analysis → Ambiguities subsection is missing, empty, or omits
      the agent's chosen interpretations. Either list ambiguities with
      disposition or state "None identified" explicitly.

  - id: AI-IR-SA-002
    name: intent_gaps_documented
    description: >
      The artifact contains a "Gaps" subsection under "Source Analysis" listing
      information the source document should contain but does not (missing stakeholder
      roles, unstated NFRs, implied integrations, missing success criteria). Each gap
      has a disposition — assumed-here with the assumption stated, will-ask-architect,
      or defer-to-design. If genuinely none, the subsection states "None identified"
      explicitly.
    required: true
    failure_message: >
      Source Analysis → Gaps subsection is missing or omits dispositions.
      Either list gaps with disposition or state "None identified" explicitly.

  - id: AI-IR-SA-003
    name: intent_speculative_content_documented
    description: >
      The artifact contains a "Speculative Content" subsection under "Source Analysis"
      listing exploratory or research-oriented content in the source document
      ("investigate whether", "explore options", "evaluate feasibility"). Each item has
      a recommendation — spawn-discovery, defer, or drop-as-non-actionable. Speculative
      content has not been converted into requirements. If genuinely none, the subsection
      states "None identified" explicitly.
    required: true
    failure_message: >
      Source Analysis → Speculative Content subsection is missing, or speculative
      source content was force-fit as a requirement. Either list items with
      recommendation or state "None identified" explicitly.

  - id: AI-IR-001
    name: problem_statement_coherent
    description: >
      The problem statement is internally consistent. It does not contain
      contradictory goals, mutually exclusive objectives, or logical conflicts
      between stated problems and proposed solutions.
    required: true
    failure_message: >
      Problem statement contains internal contradictions or conflicting goals.
      Resolve the inconsistency before requirements extraction — contradictory
      problem statements produce incoherent requirements sets.

  - id: AI-IR-002
    name: scope_does_not_contradict_constraints
    description: >
      The declared scope boundary does not contradict any constraint loaded from
      the project configuration (workspace/context/project.yml). In-scope items
      must not violate declared regulatory, budget, or architectural constraints.
    required: true
    failure_message: >
      Declared scope conflicts with one or more project constraints. Identify
      the conflict and either revise the scope or raise a formal exception.

  - id: AI-IR-003
    name: requirements_consistent
    description: >
      The full set of requirements is internally non-contradictory. No two
      requirements impose mutually exclusive constraints on the system.
      Overlapping requirements do not conflict.
    required: true
    failure_message: >
      Requirements set contains internal contradictions. Two or more requirements
      impose conflicting constraints. Resolve the conflict — clarify with
      stakeholders if needed — before proceeding to design.

  - id: AI-IR-004
    name: regulatory_requirements_captured
    description: >
      If a compliance context is defined in the project configuration, at least
      one requirement typed C (Compliance) must be present in the requirements
      artifact, directly addressing the stated regulatory context.
    required: true
    failure_message: >
      Project configuration declares a compliance context but no C-type requirements
      are present. Regulatory obligations must be captured as explicit requirements,
      not left as implicit assumptions.

  - id: AI-IR-005
    name: requirements_business_framed
    description: >
      Functional requirements (F-type) describe what the system must do for users
      or the business — not how the architecture must respond. Requirements
      expressed as architecture decisions, technology choices, or implementation
      constraints are incorrectly framed and must be rewritten in business/user terms.
    required: true
    failure_message: >
      One or more F-type requirements are expressed in architecture or implementation
      terms rather than business/user terms. Requirements must be tech-agnostic at
      this phase. Rewrite to describe user or business outcomes. Architecture
      responses are determined in the design phase.

  - id: AI-IR-006
    name: traces_to_intent
    description: >
      Every requirement includes a traces_to field referencing a valid intent origin
      in the derived INTENT.md. No requirement exists without a traceable origin.
    required: true
    failure_message: >
      One or more requirements are missing intent traceability. Every requirement
      must include traces_to referencing its initiating intent in INTENT.md.
      Untraceable requirements indicate scope creep — verify origin before proceeding.

  - id: AI-IR-007
    name: intent_aspects_covered
    description: >
      Every distinct aspect of the derived intent — each Desired Outcome, each
      declared Known Constraint requiring active treatment, each problem named in
      the Problem Statement — has at least one requirement covering it. Aspects
      with no REQ must be either listed under out-of-scope with a reason, or
      flagged as a coverage gap to the architect.
    required: true
    failure_message: >
      One or more intent aspects (Desired Outcomes, active Known Constraints, or
      problems named in the Problem Statement) have no corresponding requirement.
      Either add covering requirements, move the aspect to out-of-scope with a
      documented reason, or flag the gap.

  - id: AI-IR-008
    name: nfr_acceptance_measurable
    description: >
      Every REQ-NFR-* requirement has at least one acceptance criterion that is
      measurable — a numeric threshold, a defined unit, a falsifiable condition,
      or a referenced standard with quantitative criteria.
    required: true
    failure_message: >
      One or more REQ-NFR-* requirements have no measurable acceptance criterion.
      Rewrite to include a specific threshold, unit, or falsifiable condition.
      Vague NFRs cannot be satisfied or verified.

  - id: AI-IR-009
    name: language_discipline
    description: >
      Requirement statements use precise modal verbs: "must" or "shall" for
      mandatory behaviour, "may" for explicitly optional behaviour. No vague
      modals ("should", "might", "could") or subjective qualifiers without a
      measurable criterion. Each requirement describes one obligation.
    required: true
    failure_message: >
      One or more requirements use vague modal verbs or subjective qualifiers
      without measurable criteria, or combine two distinct behaviours with "and".
      Rewrite using "must"/"shall"/"may" and split compound requirements.

# ─── Human Gate ───────────────────────────────────────────────────────────────
# Requires explicit human confirmation. The loop agent never auto-approves these.
# Run /jupiter:review after auto checks and AI checks pass.

human_gate:
  required: true
  checks:

    - id: HG-IG-001
      name: intent_derivation_confirmed
      condition: "phases.requirements.intent_derivation == inferred"
      description: >
        Applies only when intent_derivation is 'inferred'. The architect has confirmed
        with the business owner that the inferred intent accurately represents the
        business's intent before requirements normalisation proceeds. The confidence
        note in phases.requirements.intent_confidence_note must be reviewed and
        accepted. This gate prevents inferred intent — which may be incorrect — from
        flowing unchecked into requirements and then into design.
      required: true
      failure_message: >
        Intent was inferred, not directly derived. The architect must review the
        confidence note in the initiative file and confirm with the business owner
        that the inferred intent is correct before this gate can pass. Record
        confirmation via /jupiter:review.

    - id: HG-IR-001
      name: business_owner_confirms_requirements
      description: >
        The business owner named in the stakeholder map has reviewed the requirements
        artifact and confirmed that the requirements accurately reflect the intended
        problem and desired outcomes.
      required: true
      failure_message: >
        Business owner sign-off is pending. Present the requirements artifact to the
        business owner and record explicit confirmation before this gate can pass.

    - id: HG-IR-002
      name: lead_architect_confirms_completeness
      description: >
        The lead architect has reviewed the requirements artifact and confirmed it is
        complete — nothing is missing, nothing is out of scope, and no requirement is
        expressed in architecture terms that should be deferred to design.
      required: true
      failure_message: >
        Lead architect completeness confirmation is pending. The lead architect must
        review the requirements set, confirm it is complete and correctly scoped to
        business/user terms, and explicitly sign off before this gate can pass.

# ─── Completion ───────────────────────────────────────────────────────────────

completion:
  rule: all_required_checks_pass
  human_required: true
  description: >
    Phase complete when all required auto checks and AI checks pass,
    and the human gate is approved via /jupiter:review.

# ─── Agent Guidance ───────────────────────────────────────────────────────────
# Injected into the loop agent context at the start of each ingest iteration.

agent_guidance: |
  You are ingesting a raw business requirements document and producing a structured
  Jupiter requirements artifact. Your job has two stages: (1) derive the intent
  statement from the source document, then (2) normalise requirements to Jupiter format.
  The gate checks surface what is missing or incorrect in the source — treat them as
  the quality engine, not a compliance checklist.

  STEP 0 — READ THE SOURCE DOCUMENT
  Load the raw business requirements document from the path in initiative.source_document.
  Read the entire document before extracting anything. Note the format (BRD, user stories,
  Word doc, etc.) and understand its structure. Do not begin extraction until you have a
  complete picture of what the document contains.

  STEP 0B — DERIVE INTENT
  Extract the intent from the source document and write workspace/INTENT.md.

  Populate the four sections:
    Problem Statement  — what problem the business is solving
    Business Context   — why this matters and what is driving it
    Desired Outcomes   — what the business expects to achieve
    Known Constraints  — explicitly stated constraints (budget, technology, regulatory)

  Determine derivation confidence:
    derived  — all four sections map directly to explicit content in the source document.
               No material additions; the content is extracted, not invented.
    inferred — one or more sections had to be reasoned from implicit content, reading
               between the lines, or cross-referencing with project context.

  Write the derivation result to the initiative file at phases.requirements.intent_derivation.

  If inferred:
    Write a confidence note to phases.requirements.intent_confidence_note that states:
      - Which sections were inferred (not derived directly)
      - What specific evidence in the source document supported each inference
      - What alternative interpretations exist and why you chose your interpretation
    This note is read by the architect when confirming HG-IG-001.
    Be specific — "inferred from the budget constraints mentioned in section 2" is
    acceptable; "inferred from context" is not.

  Do NOT proceed to requirements normalisation until INTENT.md is written and the
  derivation field is recorded. The gate checks (AC-IG-002, AC-IG-003) enforce this.

  STEP 1 — READ THE INTENT (from the INTENT.md you just wrote)
  Use the INTENT.md you produced in STEP 0B as the source for requirements extraction.
  The remaining steps are identical to the standard requirements flow.

  STEP 1B — ANALYSE THE SOURCE (BACKWARD GAP DETECTION)
  Before extracting requirements, analyse the derived INTENT.md for quality issues.
  Produce a "Source Analysis" section in the requirements artifact with three sub-sections:

    Ambiguities — terms with multiple interpretations, undefined concepts, vague scope
    language in the derived intent. For each: state the ambiguity, the interpretation
    chosen, and why. If you cannot resolve it, flag it for the architect.

    Gaps — information the source document should contain but does not (missing
    stakeholder roles, unstated NFRs, implied integrations, missing success criteria).
    For each: state the gap and the disposition (assumed-here with assumption stated,
    will-ask-architect, or defer-to-design).

    Speculative content — phrases like "investigate whether", "explore", "evaluate
    feasibility of". For each: recommend spawn-discovery, defer, or
    drop-as-non-actionable. Do not produce a requirement against speculative content.

  If a sub-section has no findings, write "None identified" — silence is not acceptable.

  STEP 2 — EXTRACT AND STRUCTURE REQUIREMENTS
  Extract requirements from the derived intent. Classify each as one of:
    F   — Functional: what the system must do for users or the business.
          NOT expressed as architecture decisions or technology choices.
          Good: "The system must allow invoice clerks to submit invoices via web form."
          Bad:  "The system must expose an invoice submission REST API."
    NFR — Non-Functional: quality attributes (performance, availability, scalability,
          maintainability, reliability).
    BR  — Business Rule: domain constraints, policies, business logic.
    C   — Compliance: legal, regulatory, or standards obligations.
    S   — Security: authentication, authorisation, data protection.

  SOURCE COVERAGE (enforced by AI-IG-002):
  Every requirement, constraint, rule, or quality attribute in the source document
  must be explicitly accounted for. For each meaningful piece of source content,
  either capture it as a REQ, list it as out-of-scope with a reason, or flag it in
  Source Analysis. Do not silently drop source content.

  STEP 3 — ASSIGN REQ KEYS
  Assign a unique REQ-{TYPE}-{DOMAIN}-{SEQ} key to every requirement.
  Choose DOMAIN to reflect the business domain (e.g. PROC, AUTH, RPT, NOTIF).
  Keys are immutable once assigned. Do not reuse or renumber.

  STEP 4 — WRITE ACCEPTANCE CRITERIA
  Every requirement must have at least one measurable, testable acceptance criterion.
  Good: "Invoice submission completes within 3 seconds for files up to 10MB at p99."
  Bad:  "The system should be fast."

  LANGUAGE RULES (enforced by AI-IR-009):
    - Use "must" or "shall" for mandatory behaviour, "may" for optional.
    - Do not use "should", "might", "could", "appropriate", "reasonable",
      "adequate", "user-friendly" without a measurable criterion attached.
    - One obligation per requirement. Split compound "and" behaviours into separate REQ keys.

  NFR MEASURABILITY (enforced by AI-IR-008):
    Every REQ-NFR-* must have a numeric threshold, defined unit, falsifiable condition,
    or referenced standard with quantitative criteria.

  STEP 5 — ADD INTENT TRACEABILITY
  Every requirement must include: traces_to: [intent origin in INTENT.md]
  The traces_to reference should name the specific INTENT.md section and aspect
  (e.g. "Desired Outcomes — real-time invoice status visibility").

  STEP 6 — DOCUMENT SCOPE BOUNDARY
  Explicitly state what is in scope and what is out of scope.
  Be specific: "Mobile clients" is not specific. "iOS and Android native mobile apps" is.
  Every piece of source document content that is not captured as a requirement must appear
  in the out-of-scope list with a reason.

  STEP 7 — CHECK AGAINST PROJECT CONSTRAINTS
  Load workspace/context/project.yml. Check requirements against declared constraints and
  compliance context. If a compliance context is declared, ensure at least one REQ-C-*.

  STEP 8 — SELF-REVIEW (before presenting for human gate)
  Verify:
    - INTENT.md written, no placeholder text (AC-IG-002)
    - intent_derivation recorded in initiative file (AC-IG-003)
    - If inferred: confidence note written with specific evidence (AI-IG-001)
    - All source document content accounted for (AI-IG-002)
    - Source Analysis section present with all three sub-sections
    - Problem statement: no contradictions
    - All requirements: consistent as a set
    - All F-type requirements: expressed in business/user terms
    - All traces_to fields: reference a valid INTENT.md origin
    - Every intent aspect has at least one covering REQ or is listed out-of-scope
    - Every REQ-NFR-* has a measurable acceptance criterion
    - No requirement uses vague modals or compound "and"
    - No requirement missing: key, type, acceptance criteria, or traces_to

  STEP 9 — PRESENT FOR HUMAN GATE
  If intent_derivation is 'inferred', explicitly surface the confidence note and state
  that HG-IG-001 requires architect confirmation with the business owner before the
  requirements gate can pass.

  After auto checks and AI checks pass, present the complete requirements artifact.
  Request:
    - (If inferred) Architect confirms inferred intent with business owner (HG-IG-001)
    - Business owner confirmation that requirements reflect the intended problem (HG-IR-001)
    - Lead architect confirmation that the requirements set is complete (HG-IR-002)
  Run /jupiter:review when ready. Do not mark the phase complete without human approval.
